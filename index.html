                          </div>
                        </div>
                      </div>
                    )}

                    {/* Selector de fondos con miniaturas */}
                    {msg.isBackgroundPicker && msg.backgrounds && (
                      <div style={{
                        display: 'flex',
                        justifyContent: 'flex-start',
                        marginBottom: '15px'
                      }}>
                        <div style={{
                          backgroundColor: '#e6ecf0',
                          padding: '15px',
                          borderRadius: '0px 10px 10px 10px',
                          maxWidth: '85%',
                          boxShadow: '0 1px 2px rgba(0,0,0,0.1)',
                          position: 'relative'
                        }}>
                          <div style={{
                            position: 'absolute',
                            left: '-8px',
                            top: '0',
                            width: '0',
                            height: '0',
                            borderTop: '8px solid #e6ecf0',
                            borderLeft: '8px solid transparent'
                          }} />
                          <div style={{
                            fontSize: '14px',
                            fontWeight: '500',
                            marginBottom: '12px',
                            color: '#000'
                          }}>
                            {msg.text}
                          </div>
                          <div style={{
                            display: 'grid',
                            gridTemplateColumns: 'repeat(2, 1fr)',
                            gap: '12px'
                          }}>
                            {msg.backgrounds.map((background, bgIndex) => (
                              <div
                                key={bgIndex}
                                onClick={() => handleBackgroundClick(background.valor, background.nombre)}
                                style={{
                                  display: 'flex',
                                  flexDirection: 'column',
                                  alignItems: 'center',
                                  gap: '6px',
                                  cursor: 'pointer'
                                }}
                              >
                                <div
                                  style={{
                                    width: '80px',
                                    height: '80px',
                                    borderRadius: '50%',
                                    backgroundImage: `url(${background.imagen})`,
                                    backgroundSize: 'cover',
                                    backgroundPosition: 'center',
                                    border: '3px solid #ddd',
                                    boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
                                    transition: 'transform 0.2s, box-shadow 0.2s',
                                  }}
                                  onMouseOver={(e) => {
                                    e.target.style.transform = 'scale(1.1)';
                                    e.target.style.boxShadow = '0 4px 12px rgba(0,0,0,0.25)';
                                  }}
                                  onMouseOut={(e) => {
                                    e.target.style.transform = 'scale(1)';
                                    e.target.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
                                  }}
                                />
                                <span style={{
                                  fontSize: '11px',
                                  color: '#555',
                                  textAlign: 'center',
                                  fontWeight: '500'
                                }}>
                                  {background.nombre}
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                    {/* Selector de llantas con miniaturas */}
                    {msg.isWheelsPicker && msg.wheels && (
                      <div style={{
                        display: 'flex',
                        justifyContent: 'flex-start',
                        marginBottom: '15px'
                      }}>
                        <div style={{
                          backgroundColor: '#e6ecf0',
                          padding: '15px',
                          borderRadius: '0px 10px 10px 10px',
                          maxWidth: '85%',
                          boxShadow: '0 1px 2px rgba(0,0,0,0.1)',
                          position: 'relative'
                        }}>
                          <div style={{
                            position: 'absolute',
                            left: '-8px',
                            top: '0',
                            width: '0',
                            height: '0',
                            borderTop: '8px solid #e6ecf0',
                            borderLeft: '8px solid transparent'
                          }} />
                          <div style={{
                            fontSize: '14px',
                            fontWeight: '500',
                            marginBottom: '12px',
                            color: '#000'
                          }}>
                            {msg.text}
                          </div>
                          <div style={{
                            display: 'grid',
                            gridTemplateColumns: 'repeat(2, 1fr)',
                            gap: '12px'
                          }}>
                            {msg.wheels.map((wheel, wheelIndex) => (
                              <div
                                key={wheelIndex}
                                onClick={() => handleWheelsClick(wheel.valor, wheel.nombre)}
                                style={{
                                  display: 'flex',
                                  flexDirection: 'column',
                                  alignItems: 'center',
                                  gap: '6px',
                                  cursor: 'pointer'
                                }}
                              >
                                <div
                                  style={{
                                    width: '80px',
                                    height: '80px',
                                    borderRadius: '50%',
                                    backgroundImage: `url(${wheel.miniatura})`,
                                    backgroundSize: 'cover',
                                    backgroundPosition: 'center',
                                    border: '3px solid #ddd',
                                    boxShadow: '0 2px 8px rgba(0,0,0,0.15)',
                                    transition: 'transform 0.2s, box-shadow 0.2s',
                                  }}
                                  onMouseOver={(e) => {
                                    e.target.style.transform = 'scale(1.1)';
                                    e.target.style.boxShadow = '0 4px 12px rgba(0,0,0,0.25)';
                                  }}
                                  onMouseOut={(e) => {
                                    e.target.style.transform = 'scale(1)';
                                    e.target.style.boxShadow = '0 2px 8px rgba(0,0,0,0.15)';
                                  }}
                                />
                                <span style={{
                                  fontSize: '11px',
                                  color: '#555',
                                  textAlign: 'center',
                                  fontWeight: '500'
                                }}>
                                  {wheel.nombre}
                                </span>
                              </div>
                            ))}
                          </div>
                        </div>
                      </div>
                    )}

                   {/* Opciones de respuesta */}
                  {msg.options && index === messages.length - 1 && (
                    <div style={{
                      display: 'flex',
                      flexDirection: 'column',
                      gap: '12px',
                      marginTop: '15px',
                      alignItems: 'flex-end',
                      width: '100%'
                    }}>
                      {msg.options.map((option, optIndex) => (
                        <div
                          key={optIndex}
                          onClick={() => {
                            handleOptionClick(option, currentStep);
                          }}
                          style={{
                            width: '70%',
                            backgroundColor: '#000000',
                            color: '#FFFFFF',
                            borderRadius: '12px',
                            boxShadow: '0 4px 10px rgba(0,0,0,0.15)',
                            cursor: 'pointer',
                            overflow: 'hidden',
                            transition: 'transform 0.2s ease'
                          }}
                          onMouseOver={(e) => e.currentTarget.style.transform = 'scale(1.02)'}
                          onMouseOut={(e) => e.currentTarget.style.transform = 'scale(1)'}
                        >
                          {option.image && (
                            <img
                              src={option.image}
                              alt=""
                              style={{
                                width: '100%',
                                height: '50px',
                                objectFit: 'cover'
                              }}
                            />
                          )}

                          <div style={{
                            padding: '15px',
                            fontWeight: '600',
                            fontSize: '16px',
                            textAlign: 'left'
                          }}>
                            {option.text}
                          </div>
                        </div>
                      ))}
                    </div>
                  )}

                  </div>
                ))}
                <div ref={chatEndRef} />
              </div>
            </div>
          );
        };

        // Renderizar la aplicación
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<ChatVehiculos />);
    </script>
</body>
</html>
